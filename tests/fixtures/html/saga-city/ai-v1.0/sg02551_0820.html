<h2>申告が必要な人</h2><ul>
<li>毎年1月1日時点で佐賀市に居住している人<br/>
<strong>※収入がなかった人も、収入がなかった旨の申告が必要です</strong>。</li>
<li>毎年1月1日時点で佐賀市に事業所や家屋敷を有する人</li>
</ul><p>ただし、次の人は市・県民税申告の必要がありません。</p><ul>
<li>所得税の確定申告をする人</li>
<li>勤務先から市役所に給与支払報告書が提出された人(ただし、給与の他に収入があった場合は申告が必要となります。)</li>
<li>収入が公的年金(障害年金・遺族年金等の非課税の年金を除く)のみの人<br/>
	※申告しないと適用されない控除がありますのでご注意ください。</li>
</ul><h2>関連図表</h2><p>クリックして拡大します</p><p><a href="https://www.city.saga.lg.jp/site_files/image/usefiles/figures/s20955_20120828035326.png" target="_blank"><img alt="申告が必要な人" src="https://www.city.saga.lg.jp/site_files/image/usefiles/figures/s20955_20120828035326.png"/></a></p>
